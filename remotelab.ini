"""
RemoteLab - Módulo de Logging
==============================
Configura logging estruturado para Agent e Controller.
Cada componente escreve em arquivo próprio e no console.
"""

import logging
import logging.handlers
import os
from pathlib import Path


def setup_logger(name: str, log_dir: str = "logs", level: int = logging.DEBUG) -> logging.Logger:
    """
    Configura e retorna um logger com handlers de arquivo e console.

    Args:
        name    : nome do logger (ex: "agent", "controller")
        log_dir : diretório onde os arquivos de log serão salvos
        level   : nível de log (DEBUG, INFO, WARNING, ERROR)

    Returns:
        Logger configurado
    """
    Path(log_dir).mkdir(parents=True, exist_ok=True)
    log_file = os.path.join(log_dir, f"{name}.log")

    logger = logging.getLogger(name)
    logger.setLevel(level)

    # Evita duplicar handlers se chamado múltiplas vezes
    if logger.handlers:
        return logger

    fmt = logging.Formatter(
        fmt="%(asctime)s | %(levelname)-8s | %(name)s | %(message)s",
        datefmt="%Y-%m-%d %H:%M:%S"
    )

    # Handler de arquivo com rotação (máx 5MB, 3 backups)
    fh = logging.handlers.RotatingFileHandler(
        log_file, maxBytes=5 * 1024 * 1024, backupCount=3, encoding="utf-8"
    )
    fh.setFormatter(fmt)
    fh.setLevel(logging.DEBUG)

    # Handler de console
    ch = logging.StreamHandler()
    ch.setFormatter(fmt)
    ch.setLevel(logging.INFO)

    logger.addHandler(fh)
    logger.addHandler(ch)

    return logger
